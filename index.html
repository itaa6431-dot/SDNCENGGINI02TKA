<html lang="id">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1d4ed8,#2563eb);
      overflow-x:hidden;
      padding:20px;
    }

    .background{
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
      background:
      radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 25%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.15), transparent 25%);
      z-index:-1;
    }

    .container{
      max-width:750px;
      margin:auto;
    }

    .header-card{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:30px;
      padding:40px;
      text-align:center;
      color:white;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .logo{
      width:90px;
      margin-bottom:20px;
    }

    h1{
      font-size:34px;
      margin-bottom:10px;
      font-weight:700;
    }

    h2{
      font-size:24px;
      font-weight:500;
      margin-bottom:10px;
    }

    .subtitle{
      opacity:0.9;
      font-size:15px;
    }

    .login-card{
      margin-top:30px;
      background:white;
      border-radius:30px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .login-card h3{
      text-align:center;
      color:#1e3a8a;
      margin-bottom:25px;
      font-size:26px;
    }

    input{
      width:100%;
      padding:17px;
      border-radius:15px;
      border:2px solid #dbeafe;
      font-size:16px;
      margin-bottom:20px;
      outline:none;
      transition:0.3s;
    }

    input:focus{
      border-color:#2563eb;
      box-shadow:0 0 10px rgba(37,99,235,0.3);
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 20px rgba(37,99,235,0.3);
    }

    .result-card{
      margin-top:30px;
      background:#f8fafc;
      border-radius:25px;
      padding:30px;
      border-left:6px solid #2563eb;
      animation:fadeIn 0.5s ease;
    }

    .result-title{
      text-align:center;
      color:#1e3a8a;
      margin-bottom:25px;
      font-size:24px;
    }

    .data-row{
      display:flex;
      justify-content:space-between;
      gap:20px;
      margin-bottom:15px;
      padding-bottom:10px;
      border-bottom:1px solid #e2e8f0;
    }

    .label{
      font-weight:600;
      color:#334155;
    }

    .value{
      color:#0f172a;
      text-align:right;
    }

    .nilai-box{
      margin-top:25px;
      background:white;
      padding:20px;
      border-radius:20px;
    }

    .nilai-item{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      font-size:18px;
    }

    .success{
      margin-top:20px;
      text-align:center;
      color:green;
      font-weight:600;
    }

    .error{
      margin-top:25px;
      background:#fee2e2;
      color:#b91c1c;
      padding:15px;
      border-radius:15px;
      text-align:center;
      font-weight:600;
    }

    .footer{
      text-align:center;
      margin-top:25px;
      color:white;
      opacity:0.9;
      font-size:14px;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(15px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:600px){

      h1{
        font-size:26px;
      }

      h2{
        font-size:18px;
      }

      .data-row,
      .nilai-item{
        flex-direction:column;
      }

      .value{
        text-align:left;
      }

      .header-card,
      .login-card{
        padding:25px;
      }

    }

  </style>
</head>

function cekData(){

  dataSiswa.find(
